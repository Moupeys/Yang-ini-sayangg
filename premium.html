<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebNeyo — Premium Link Hub (Minecraft Edition)</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

  <style>
    /* =========================================
       1. MINECRAFT CORE SYSTEM & BACKGROUND
    ========================================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      image-rendering: pixelated; /* Menjaga aset gambar tetap tajam ala pixel art */
    }

    body {
      font-family: 'VT323', monospace;
      font-size: 22px;
      /* Background Gradasi Biru Langit khas Minecraft */
      background: linear-gradient(180deg, #74b9ff 0%, #a29bfe 100%);
      background-attachment: fixed;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Font tebal khusus Judul Utama & Sub-Header */
    .title-pixel {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      text-shadow: 2px 2px 0px #000;
      color: #fff;
    }

    /* =========================================
       2. REUSABLE GUI BLOCKS (Lapisan Box & Slot)
    ========================================= */
    /* Container Utama Terpusat di Tengah Layar */
    .mc-container {
      width: 100%;
      max-width: 520px;
      background: #dbdbdb; /* Lapisan dalam abu-abu bersih khas inventory */
      border: 4px solid #555555;
      box-shadow: 
        inset 4px 4px 0px #fff, 
        inset -4px -4px 0px #8b8b8b, 
        6px 6px 0px rgba(0, 0, 0, 0.15);
      padding: 30px 24px;
      margin: 50px auto;
      text-align: center;
      animation: fadeInPage 0.8s steps(4) ease-in-out; /* Animasi patah-patah retro */
    }

    /* Slot Kotak untuk Membungkus GIF/Foto Profil */
    .item-slot {
      background: #8b8b8b;
      border: 4px solid #373737;
      box-shadow: inset 4px 4px 0px #555, inset -4px -4px 0px #dbdbdb;
      display: inline-block;
      padding: 6px;
      margin-bottom: 10px;
      animation: floating 3s infinite ease-in-out;
    }

    /* =========================================
       3. HEADER LAYOUT
    ========================================= */
    header {
      width: 100%;
      max-width: 520px;
      padding: 14px 20px;
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #3c81bc; /* Biru Diamond Block */
      border: 4px solid #000;
      box-shadow: inset -4px -4px 0px #244e74, inset 4px 4px 0px #6ba9df;
      color: #fff;
    }

    header .menu-icon,
    header .search-icon {
      font-family: 'Press Start 2P', monospace;
      font-size: 16px;
      cursor: pointer;
      text-shadow: 2px 2px 0px #000;
    }
    header .menu-icon:hover { color: #a3ffb3; }

    /* =========================================
       4. SIDEBAR NAVIGATION
    ========================================= */
    .sidebar {
      position: fixed;
      left: -310px;
      top: 0;
      width: 260px;
      height: 100vh;
      padding: 22px;
      transition: .3s steps(4);
      z-index: 999;
      background: #2c2c2c;
      border-right: 6px solid #141414;
    }

    .sidebar.active { left: 0; }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      color: #fff;
      border-bottom: 4px solid #141414;
      padding-bottom: 10px;
    }

    .close-sidebar { font-size: 28px; cursor: pointer; }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      list-style: none;
    }

    .nav-links a {
      color: #fff;
      padding: 10px;
      text-decoration: none;
      font-size: 22px;
      background: #555;
      border: 3px solid #000;
      box-shadow: inset -3px -3px 0px #373737, inset 3px 3px 0px #8b8b8b;
      display: block;
      text-align: center;
    }

    .nav-links a:hover {
      background: #5c8e32;
      box-shadow: inset -3px -3px 0px #3b5e1e, inset 3px 3px 0px #82be4f;
    }

    /* =========================================
       5. CENTER CONTENT & ANIMATIONS
    ========================================= */
    .center-content img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      display: block;
    }

    .simple-text {
      margin-top: 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      color: #ff5555; /* Warna teks peringatan merah khas Minecraft */
      text-shadow: 2px 2px 0px #330000;
      line-height: 1.4;
    }

    /* ✨ TOMBOL KEMBALI 3D RETRO ✨ */
    .back-btn {
      display: block;
      width: 100%;
      max-width: 240px;
      margin: 25px auto 0;
      padding: 12px;
      background: #555; /* Default abu-abu gelap tombol MC */
      color: #e0e0e0;
      font-family: 'VT323', monospace;
      font-size: 24px;
      font-weight: bold;
      text-decoration: none;
      border: 3px solid #000;
      text-shadow: 2px 2px 0px #222;
      box-shadow: inset -3px -3px 0px #373737, inset 3px 3px 0px #8b8b8b;
    }

    .back-btn:hover {
      color: #fff;
      border-color: #fff;
      text-shadow: 2px 2px 0px #000;
      background: #7ba4ff; /* Menyala biru ungu saat di-hover */
      box-shadow: inset -3px -3px 0px #2e54b6, inset 3px 3px 0px #c1d5ff;
    }

    /* Keyframes Animasi */
    @keyframes floating {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    @keyframes fadeInPage {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive Setup */
    @media (max-width: 768px) {
      .sidebar { width: 100%; left: -100%; }
    }
  </style>
</head>

<body>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2 class="title-pixel" style="font-size: 12px;">OPTIONS</h2>
      <span class="close-sidebar" onclick="toggleSidebar()">×</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">🏠 Home</a></li>
      <li><a href="Fix.html">🛠️ Fix Eror</a></li>
      <li><a href="premium.html">⭐ Premium List</a></li>
      <li><a href="contact.html">☎️ Kontak</a></li>
      <li><a href="https://www.itemku.com/t/peppeyid" target="_blank">🛒 Itemku Store</a></li>
    </ul>
  </nav>

  <header>
    <div class="menu-icon" onclick="toggleSidebar()">☰</div>
    <h1 class="title-pixel">LINK NeyoStore</h1>
    <div class="search-icon" onclick="alert('Fitur akan segera hadir!')">🔍</div>
  </header>

  <main class="mc-container">
    <div class="center-content">
      
      <div class="item-slot">
        <img src="image/hsr-sparkle.gif" alt="Profile Roblox">
      </div>
      
      <div class="simple-text">Maaf situs belum dijangkau</div>
      
      <a href="index.html" class="back-btn">⬅ Kembali</a>
      
    </div>
  </main>

  <script>
    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("active");
    }
  </script>

</body>

</html>
